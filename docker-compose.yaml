version: '3.8'

services:
  runner-app:
    build: .
    container_name: runner-app
    # 이 라인을 추가하여 .env 파일에서 환경 변수를 명시적으로 로드합니다.
    env_file:
      - .env
    environment:
      # Telegram API Credentials
      # 이 변수들은 이제 env_file을 통해 로드되지만,
      # 어떤 변수들이 사용되는지 문서화하기 위해 여기에 유지합니다.
      API_ID: ${API_ID}
      API_HASH: ${API_HASH}
      PHONE_NUMBER: ${PHONE_NUMBER}
      # Docker용 내부 경로를 정의합니다. 이 경로는 호스트 볼륨에 매핑됩니다.
      # ConfigManager가 DOWNLOADS_DIR 및 SESSION_DIR 환경 변수가 제공되지 않으면
      # /app/downloads 및 /app/session을 기본값으로 사용하므로 여기에 명시적으로 설정할 필요가 없습니다.
    volumes:
      # 영구 저장을 위한 호스트 디렉토리를 매핑합니다.
      # telegram_downloads_data 볼륨은 컨테이너 내부의 /app/downloads에 마운트됩니다.
      - telegram_downloads_data:/app/downloads
      # telegram_session_data 볼륨은 컨테이너 내부의 /app/session에 마운트됩니다.
      - telegram_session_data:/app/session
    # 애플리케이션이 인터넷에 액세스해야 하는 경우 제한되지 않도록 합니다.
    # networks:
    #   - default

volumes:
  # Define named volumes for persistent data
  telegram_downloads_data:
    driver: local
  telegram_session_data:
    driver: local
